<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Test - {{ settings.APP_NAME }}</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- MapLibre GL JS -->
    <link href="https://unpkg.com/maplibre-gl@3.3.1/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@3.3.1/dist/maplibre-gl.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/custom.css' %}">
    
    <style>
        #test-map {
            height: 600px;
            width: 100%;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="container mx-auto p-4">
        <h1 class="text-2xl font-bold mb-4">MapLibre GL JS Test</h1>
        
        <div class="mb-4 space-x-4">
            <button id="draw-btn" class="px-4 py-2 bg-active-gold text-white rounded">
                Draw AOI
            </button>
            <button id="scan-btn" class="px-4 py-2 bg-sidebar-green text-white rounded">
                Scan AOI
            </button>
            <button id="clear-btn" class="px-4 py-2 bg-gray-600 text-white rounded">
                Clear
            </button>
        </div>
        
        <div id="test-map" class="border rounded-lg"></div>
        
        <div id="status" class="mt-4 p-4 bg-white rounded-lg border">
            <h2 class="font-semibold mb-2">Status:</h2>
            <p id="status-text">Ready to test map functionality</p>
        </div>
    </div>

    <script src="{% static 'js/map_handler.js' %}"></script>
    <script>
        // Test the map handler
        document.addEventListener('DOMContentLoaded', function() {
            const statusText = document.getElementById('status-text');
            
            try {
                // Initialize map handler
                window.testMapHandler = new MapHandler('test-map', {
                    center: [-1.6244, 6.6885],
                    zoom: 10
                });
                
                statusText.textContent = '✅ MapHandler initialized successfully';
                
                // Setup test buttons
                document.getElementById('draw-btn').addEventListener('click', () => {
                    if (window.testMapHandler) {
                        window.testMapHandler.toggleDrawingMode();
                        statusText.textContent = '🎨 Drawing mode toggled';
                    }
                });
                
                document.getElementById('scan-btn').addEventListener('click', () => {
                    if (window.testMapHandler) {
                        window.testMapHandler.scanAOI();
                        statusText.textContent = '🔍 AOI scan initiated';
                    }
                });
                
                document.getElementById('clear-btn').addEventListener('click', () => {
                    if (window.testMapHandler) {
                        window.testMapHandler.clearDrawing();
                        statusText.textContent = '🧹 Drawing cleared';
                    }
                });
                
            } catch (error) {
                statusText.textContent = '❌ Error: ' + error.message;
                console.error('Map handler error:', error);
            }
        });
    </script>
</body>
</html>
