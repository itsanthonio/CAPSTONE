<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — {{ settings.APP_NAME }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'gis-blue': '#3b82f6',
                        'active-gold': '#f59e0b',
                        'sidebar-green': '#062d1f',
                    },
                    fontFamily: {
                        'sans': ['Inter', 'ui-sans-serif', 'system-ui'],
                    },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans antialiased">

<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8">
        <div>
            <div class="mx-auto h-12 w-12 flex items-center justify-center">
                <div class="w-10 h-10 bg-active-gold rounded-lg flex items-center justify-center">
                    <span class="text-white font-bold text-lg">G</span>
                </div>
            </div>
            <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
                Sign in to {{ settings.APP_NAME }}
            </h2>
            <p class="mt-2 text-center text-sm text-gray-600">
                Environmental monitoring and illegal mining detection
            </p>
        </div>

        <form class="mt-8 space-y-6" method="post">
            {% csrf_token %}

            {% if form.errors %}
            <div class="bg-red-50 border border-red-200 rounded-lg p-4">
                <div class="text-sm text-red-800">
                    {% for field, errors in form.errors.items %}
                        {% for error in errors %}
                            <p>{{ error }}</p>
                        {% endfor %}
                    {% endfor %}
                </div>
            </div>
            {% endif %}

            <div class="space-y-4">
                <div>
                    <label for="id_username" class="block text-sm font-medium text-gray-700">Username</label>
                    <input id="id_username" name="username" type="text" required autocomplete="username"
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-lg text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-active-gold focus:border-transparent sm:text-sm"
                           placeholder="Enter your username">
                </div>

                <div>
                    <label for="id_password" class="block text-sm font-medium text-gray-700">
                        Password
                    </label>
                    <input 
                        id="id_password" 
                        name="password" 
                        type="password" 
                        required
                        class="mt-1 appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-lg focus:outline-none focus:ring-gis-blue focus:border-gis-blue focus:z-10 sm:text-sm"
                        placeholder="Enter your password"
                        autocomplete="current-password"
                    >
                </div>
            </div>

            <div class="flex items-center">
                <input id="remember-me" name="remember_me" type="checkbox"
                       class="h-4 w-4 text-active-gold border-gray-300 rounded">
                <label for="remember-me" class="ml-2 block text-sm text-gray-700">Remember me</label>
            </div>

            <button type="submit"
                    class="w-full flex justify-center py-2.5 px-4 border border-transparent text-sm font-semibold rounded-lg text-white bg-active-gold hover:bg-opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-active-gold transition-colors">
                Sign in
            </button>
        </form>

        <p class="text-center text-sm text-gray-600">
            Don't have an account?
            <a href="{% url 'signup' %}" class="font-medium text-gis-blue hover:text-blue-600">Sign up</a>
        </p>
    </div>
</div>

</body>
</html>
