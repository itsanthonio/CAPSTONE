{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Your Email — SankofaWatch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'surface-base': 'var(--surface-base)',
                        'surface-2':    'var(--surface-2)',
                        'surface-3':    'var(--surface-3)',
                        'fg-primary':   'var(--text-primary)',
                        'fg-secondary': 'var(--text-secondary)',
                        'fg-muted':     'var(--text-tertiary)',
                        'gw-accent':    'var(--accent)',
                        'edge-default': 'var(--border-default)',
                    },
                    fontFamily: { 'sans': ['Inter', 'ui-sans-serif', 'system-ui'] },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/custom.css' %}">
</head>
<body class="bg-surface-base font-sans antialiased">

<div class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-sm space-y-6 text-center">

        <!-- Icon -->
        <div class="flex justify-center">
            <div class="w-14 h-14 rounded-xl flex items-center justify-center"
                 style="background: var(--status-resolved-bg); border: 1px solid var(--status-resolved-border)">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"
                     style="color: var(--status-resolved)" aria-hidden="true" focusable="false">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                </svg>
            </div>
        </div>

        <div>
            <h1 class="text-[20px] font-semibold text-fg-primary tracking-tight">Check your inbox</h1>
            <p class="text-[13px] text-fg-secondary mt-2 leading-relaxed">
                We sent a confirmation link to your email address.<br>
                Click it to activate your account.
            </p>
        </div>

        <!-- Info note -->
        <div class="gw-card text-left" style="padding: 16px 18px;">
            <p class="text-[12px] font-semibold text-fg-primary mb-2">Didn't receive it?</p>
            <ul class="space-y-1.5" style="list-style: disc; padding-left: 16px;">
                <li class="text-[12px] text-fg-secondary">Check your spam or junk folder</li>
                <li class="text-[12px] text-fg-secondary">The link expires in 24 hours</li>
                <li class="text-[12px] text-fg-secondary">
                    Wrong email?
                    <a href="{% url 'signup' %}" class="font-medium hover:underline" style="color: var(--accent)">Sign up again</a>
                </li>
            </ul>
        </div>

        <a href="{% url 'login' %}" class="text-[13px] text-fg-secondary hover:underline">
            Back to sign in
        </a>
    </div>
</div>

</body>
</html>
