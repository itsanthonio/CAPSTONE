{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Invalid — SankofaWatch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'surface-base': 'var(--surface-base)',
                        'surface-2':    'var(--surface-2)',
                        'surface-3':    'var(--surface-3)',
                        'fg-primary':   'var(--text-primary)',
                        'fg-secondary': 'var(--text-secondary)',
                        'fg-muted':     'var(--text-tertiary)',
                        'gw-accent':    'var(--accent)',
                        'edge-default': 'var(--border-default)',
                    },
                    fontFamily: { 'sans': ['Inter', 'ui-sans-serif', 'system-ui'] },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/custom.css' %}">
</head>
<body class="bg-surface-base font-sans antialiased">

<div class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-sm space-y-6 text-center">

        <!-- Icon -->
        <div class="flex justify-center">
            <div class="w-14 h-14 rounded-xl flex items-center justify-center"
                 style="background: var(--status-critical-bg); border: 1px solid var(--status-critical-border)">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"
                     style="color: var(--status-critical)" aria-hidden="true" focusable="false">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
            </div>
        </div>

        <div>
            <h1 class="text-[20px] font-semibold text-fg-primary tracking-tight">Link invalid or expired</h1>
            <p class="text-[13px] text-fg-secondary mt-2 leading-relaxed">
                This activation link has already been used or has expired.<br>
                Activation links are valid for 24 hours.
            </p>
        </div>

        <div class="flex flex-col gap-3">
            <a href="{% url 'signup' %}" class="btn-primary py-2">
                Create a new account
            </a>
            <a href="{% url 'login' %}" class="btn-secondary py-2">
                Sign in
            </a>
        </div>

    </div>
</div>

</body>
</html>
