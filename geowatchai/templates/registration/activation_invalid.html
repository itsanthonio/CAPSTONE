<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Invalid — GalamseyWatch AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'gis-blue': '#3b82f6',
                        'active-gold': '#f59e0b',
                        'sidebar-green': '#062d1f',
                    },
                    fontFamily: { 'sans': ['Inter', 'ui-sans-serif', 'system-ui'] }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans antialiased">

<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full text-center space-y-6">
        <div class="mx-auto h-16 w-16 bg-red-100 rounded-full flex items-center justify-center">
            <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
            </svg>
        </div>

        <div>
            <h2 class="text-3xl font-extrabold text-gray-900">Link invalid or expired</h2>
            <p class="mt-3 text-gray-600">
                This activation link has already been used or has expired.<br>
                Activation links are valid for 24 hours.
            </p>
        </div>

        <div class="flex flex-col sm:flex-row justify-center gap-3">
            <a href="{% url 'signup' %}"
               class="px-5 py-2.5 text-sm font-semibold text-white bg-active-gold hover:bg-opacity-90 rounded-lg transition-colors">
                Create a new account
            </a>
            <a href="{% url 'login' %}"
               class="px-5 py-2.5 text-sm font-semibold text-gray-700 bg-white border border-gray-300 hover:bg-gray-50 rounded-lg transition-colors">
                Sign in
            </a>
        </div>
    </div>
</div>

</body>
</html>
