<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password — GalamseyWatch AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'gis-blue': '#3b82f6',
                        'active-gold': '#f59e0b',
                        'sidebar-green': '#062d1f',
                    },
                    fontFamily: { 'sans': ['Inter', 'ui-sans-serif', 'system-ui'] }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans antialiased">

<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8">
        <div>
            <div class="mx-auto h-12 w-12 flex items-center justify-center">
                <div class="w-10 h-10 bg-active-gold rounded-lg flex items-center justify-center">
                    <span class="text-white font-bold text-lg">G</span>
                </div>
            </div>
            <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
                Set a new password
            </h2>
            <p class="mt-2 text-center text-sm text-gray-600">
                Choose a strong password for your account
            </p>
        </div>

        {% if error %}
        <div class="bg-red-50 border border-red-200 rounded-lg p-4">
            <p class="text-sm text-red-800">{{ error }}</p>
        </div>
        {% endif %}

        <form class="mt-8 space-y-5" method="post">
            {% csrf_token %}

            <div>
                <label for="new_password1" class="block text-sm font-medium text-gray-700">New password</label>
                <div class="relative mt-1">
                    <input id="new_password1" name="new_password1" type="password" required autocomplete="new-password"
                           class="block w-full px-3 py-2 border border-gray-300 rounded-lg text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-active-gold focus:border-transparent sm:text-sm"
                           placeholder="At least 8 characters">
                    <button type="button" onclick="togglePwd('new_password1', this)"
                            class="absolute right-3 top-2 text-gray-400 hover:text-gray-600">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div>
                <label for="new_password2" class="block text-sm font-medium text-gray-700">Confirm new password</label>
                <div class="relative mt-1">
                    <input id="new_password2" name="new_password2" type="password" required autocomplete="new-password"
                           class="block w-full px-3 py-2 border border-gray-300 rounded-lg text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-active-gold focus:border-transparent sm:text-sm"
                           placeholder="Repeat your new password">
                    <button type="button" onclick="togglePwd('new_password2', this)"
                            class="absolute right-3 top-2 text-gray-400 hover:text-gray-600">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Password strength hint -->
            <div id="strength-bar" class="hidden">
                <div class="flex gap-1 mb-1">
                    <div id="s1" class="h-1 flex-1 rounded bg-gray-200"></div>
                    <div id="s2" class="h-1 flex-1 rounded bg-gray-200"></div>
                    <div id="s3" class="h-1 flex-1 rounded bg-gray-200"></div>
                    <div id="s4" class="h-1 flex-1 rounded bg-gray-200"></div>
                </div>
                <p id="strength-label" class="text-xs text-gray-400"></p>
            </div>

            <button type="submit"
                    class="w-full flex justify-center py-2.5 px-4 border border-transparent text-sm font-semibold rounded-lg text-white bg-active-gold hover:bg-opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-active-gold transition-colors">
                Save new password
            </button>
        </form>
    </div>
</div>

<script>
function togglePwd(id, btn) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
}

// Simple password strength indicator
const p1 = document.getElementById('new_password1');
const bar = document.getElementById('strength-bar');
const label = document.getElementById('strength-label');
const segs = ['s1','s2','s3','s4'].map(id => document.getElementById(id));
const colors = ['bg-red-400','bg-orange-400','bg-yellow-400','bg-green-500'];
const labels = ['Too weak','Weak','Fair','Strong'];

p1.addEventListener('input', () => {
    const v = p1.value;
    if (!v) { bar.classList.add('hidden'); return; }
    bar.classList.remove('hidden');
    let score = 0;
    if (v.length >= 8) score++;
    if (/[A-Z]/.test(v)) score++;
    if (/[0-9]/.test(v)) score++;
    if (/[^A-Za-z0-9]/.test(v)) score++;
    segs.forEach((s, i) => {
        s.className = `h-1 flex-1 rounded ${i < score ? colors[score-1] : 'bg-gray-200'}`;
    });
    label.textContent = labels[score - 1] || '';
});
</script>
</body>
</html>
