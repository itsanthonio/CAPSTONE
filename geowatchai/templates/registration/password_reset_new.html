{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password — SankofaWatch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'surface-base': 'var(--surface-base)',
                        'surface-2':    'var(--surface-2)',
                        'surface-3':    'var(--surface-3)',
                        'fg-primary':   'var(--text-primary)',
                        'fg-secondary': 'var(--text-secondary)',
                        'fg-muted':     'var(--text-tertiary)',
                        'gw-accent':    'var(--accent)',
                        'edge-default': 'var(--border-default)',
                    },
                    fontFamily: { 'sans': ['Inter', 'ui-sans-serif', 'system-ui'] },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/custom.css' %}">
    <style>
        .pwd-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            padding: 2px;
            cursor: pointer;
            color: var(--text-tertiary);
            transition: color 150ms;
            display: flex;
            align-items: center;
        }
        .pwd-toggle:hover { color: var(--text-secondary); }
        .strength-seg {
            height: 3px;
            flex: 1;
            border-radius: 2px;
            background: var(--border-subtle);
            transition: background 200ms;
        }
    </style>
</head>
<body class="bg-surface-base font-sans antialiased">

<div class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-sm space-y-6">

        <!-- Logo -->
        <div class="flex flex-col items-center gap-3">
            <div class="w-10 h-10 flex items-center justify-center" aria-hidden="true">
                <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-9 h-9" aria-hidden="true" focusable="false">
                    <path d="M10 10L18 18M30 10L22 18M10 30L18 22M30 30L22 22" stroke="var(--accent)" stroke-width="2.2" stroke-linecap="round"/>
                    <circle cx="20" cy="20" r="4" fill="var(--accent)"/>
                    <circle cx="20" cy="20" r="9" stroke="var(--accent)" stroke-width="1.6" stroke-dasharray="4 3"/>
                    <circle cx="10" cy="10" r="2.5" fill="var(--accent)" fill-opacity="0.45"/>
                    <circle cx="30" cy="10" r="2.5" fill="var(--accent)" fill-opacity="0.45"/>
                    <circle cx="10" cy="30" r="2.5" fill="var(--accent)" fill-opacity="0.45"/>
                    <circle cx="30" cy="30" r="2.5" fill="var(--accent)" fill-opacity="0.45"/>
                </svg>
            </div>
            <div class="text-center">
                <h1 class="text-[20px] font-semibold text-fg-primary tracking-tight">Set a new password</h1>
                <p class="text-[13px] text-fg-secondary mt-1">Choose a strong password for your account</p>
            </div>
        </div>

        <!-- Card -->
        <div class="gw-card" style="padding: 28px;">

            {% if error %}
            <div class="gw-alert-error mb-5 flex gap-2.5" role="alert" aria-live="assertive">
                <svg class="w-4 h-4 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" aria-hidden="true" focusable="false">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
                <p class="text-[13px]">{{ error }}</p>
            </div>
            {% endif %}

            <form method="post" class="space-y-4">
                {% csrf_token %}

                <div>
                    <label for="new_password1" class="gw-label">New password</label>
                    <div class="relative">
                        <input id="new_password1" name="new_password1" type="password" required autocomplete="new-password"
                               class="gw-input" style="padding-right: 36px;" placeholder="At least 8 characters">
                        <button type="button" class="pwd-toggle" onclick="togglePwd('new_password1', this)"
                                aria-label="Toggle password visibility">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" aria-hidden="true" focusable="false">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                    <!-- Strength bar -->
                    <div id="strength-bar" class="hidden mt-2">
                        <div class="flex gap-1 mb-1">
                            <div id="s1" class="strength-seg"></div>
                            <div id="s2" class="strength-seg"></div>
                            <div id="s3" class="strength-seg"></div>
                            <div id="s4" class="strength-seg"></div>
                        </div>
                        <p id="strength-label" class="text-[11px]" style="color: var(--text-tertiary)"></p>
                    </div>
                </div>

                <div>
                    <label for="new_password2" class="gw-label">Confirm new password</label>
                    <div class="relative">
                        <input id="new_password2" name="new_password2" type="password" required autocomplete="new-password"
                               class="gw-input" style="padding-right: 36px;" placeholder="Repeat your new password">
                        <button type="button" class="pwd-toggle" onclick="togglePwd('new_password2', this)"
                                aria-label="Toggle password visibility">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" aria-hidden="true" focusable="false">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-primary w-full py-2 mt-1">
                    Save new password
                </button>
            </form>
        </div>

    </div>
</div>

<script>
function togglePwd(id, btn) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
}

(function () {
    const p1 = document.getElementById('new_password1');
    const bar = document.getElementById('strength-bar');
    const label = document.getElementById('strength-label');
    const segs = ['s1', 's2', 's3', 's4'].map(id => document.getElementById(id));
    const segColors = [
        'var(--status-critical)',
        'var(--status-high)',
        'var(--status-moderate)',
        'var(--status-resolved)'
    ];
    const segLabels = ['Too weak', 'Weak', 'Fair', 'Strong'];
    const labelColors = [
        'var(--status-critical)',
        'var(--status-high)',
        'var(--status-moderate)',
        'var(--status-resolved)'
    ];

    p1.addEventListener('input', () => {
        const v = p1.value;
        if (!v) { bar.classList.add('hidden'); return; }
        bar.classList.remove('hidden');
        let score = 0;
        if (v.length >= 8) score++;
        if (/[A-Z]/.test(v)) score++;
        if (/[0-9]/.test(v)) score++;
        if (/[^A-Za-z0-9]/.test(v)) score++;
        segs.forEach((s, i) => {
            s.style.background = i < score ? segColors[score - 1] : 'var(--border-subtle)';
        });
        label.textContent = segLabels[score - 1] || '';
        label.style.color = score > 0 ? labelColors[score - 1] : 'var(--text-tertiary)';
    });
})();
</script>

</body>
</html>
