<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete — GalamseyWatch AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'gis-blue': '#3b82f6',
                        'active-gold': '#f59e0b',
                        'sidebar-green': '#062d1f',
                    },
                    fontFamily: { 'sans': ['Inter', 'ui-sans-serif', 'system-ui'] }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans antialiased">

<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full text-center space-y-6">
        <div class="mx-auto h-16 w-16 bg-green-100 rounded-full flex items-center justify-center">
            <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
        </div>

        <div>
            <h2 class="text-3xl font-extrabold text-gray-900">Password reset!</h2>
            <p class="mt-3 text-gray-600">
                Your password has been set. You can now sign in with your new credentials.
            </p>
        </div>

        <a href="{% url 'login' %}"
           class="inline-block px-6 py-2.5 text-sm font-semibold text-white bg-active-gold hover:bg-opacity-90 rounded-lg transition-colors">
            Sign in
        </a>
    </div>
</div>

</body>
</html>
