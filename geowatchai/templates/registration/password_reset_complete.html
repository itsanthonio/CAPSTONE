{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Updated — SankofaWatch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'surface-base': 'var(--surface-base)',
                        'surface-2':    'var(--surface-2)',
                        'surface-3':    'var(--surface-3)',
                        'fg-primary':   'var(--text-primary)',
                        'fg-secondary': 'var(--text-secondary)',
                        'fg-muted':     'var(--text-tertiary)',
                        'gw-accent':    'var(--accent)',
                        'edge-default': 'var(--border-default)',
                    },
                    fontFamily: { 'sans': ['Inter', 'ui-sans-serif', 'system-ui'] },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/custom.css' %}">
</head>
<body class="bg-surface-base font-sans antialiased">

<div class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-sm space-y-6 text-center">

        <!-- Icon -->
        <div class="flex justify-center">
            <div class="w-14 h-14 rounded-xl flex items-center justify-center"
                 style="background: var(--status-resolved-bg); border: 1px solid var(--status-resolved-border)">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"
                     style="color: var(--status-resolved)" aria-hidden="true" focusable="false">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                </svg>
            </div>
        </div>

        <div>
            <h1 class="text-[20px] font-semibold text-fg-primary tracking-tight">Password updated</h1>
            <p class="text-[13px] text-fg-secondary mt-2 leading-relaxed">
                Your password has been set. You can now sign in with your new credentials.
            </p>
        </div>

        <a href="{% url 'login' %}" class="btn-primary inline-block px-6 py-2">
            Sign in
        </a>

    </div>
</div>

</body>
</html>
