<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter Reset Code — GalamseyWatch AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'gis-blue': '#3b82f6',
                        'active-gold': '#f59e0b',
                        'sidebar-green': '#062d1f',
                    },
                    fontFamily: { 'sans': ['Inter', 'ui-sans-serif', 'system-ui'] }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans antialiased">

<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8">
        <div>
            <div class="mx-auto h-12 w-12 flex items-center justify-center">
                <div class="w-10 h-10 bg-active-gold rounded-lg flex items-center justify-center">
                    <span class="text-white font-bold text-lg">G</span>
                </div>
            </div>
            <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
                Enter your reset code
            </h2>
            <p class="mt-2 text-center text-sm text-gray-600">
                We sent a 6-digit code to
                {% if email %}
                    <span class="font-medium text-gray-800">{{ email }}</span>
                {% else %}
                    your email address
                {% endif %}
            </p>
        </div>

        {% if error %}
        <div class="bg-red-50 border border-red-200 rounded-lg p-4">
            <p class="text-sm text-red-800">{{ error }}</p>
        </div>
        {% endif %}

        <form class="mt-8 space-y-6" method="post">
            {% csrf_token %}
            <input type="hidden" name="email" value="{{ email }}">

            <div>
                <label for="pin" class="block text-sm font-medium text-gray-700 mb-2">
                    Reset code
                </label>
                <input id="pin" name="pin" type="text" inputmode="numeric" pattern="[0-9]{6}"
                       maxlength="6" autocomplete="one-time-code" required autofocus
                       class="block w-full text-center text-4xl font-bold tracking-[0.5em] px-4 py-4 border-2 border-gray-300 rounded-xl text-gray-900 placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-active-gold focus:border-active-gold"
                       placeholder="——————">
                <p class="mt-2 text-center text-xs text-gray-400">Check your spam folder if you don't see it · Expires in 10 minutes</p>
            </div>

            <button type="submit"
                    class="w-full flex justify-center py-3 px-4 border border-transparent text-sm font-semibold rounded-lg text-white bg-active-gold hover:bg-opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-active-gold transition-colors">
                Verify code
            </button>
        </form>

        <div class="text-center space-y-2">
            <p class="text-sm text-gray-500">
                Didn't receive a code?
                <a href="/accounts/password_reset/" class="font-medium text-gis-blue hover:text-blue-600">Try again</a>
            </p>
            <p class="text-sm text-gray-500">
                <a href="{% url 'login' %}" class="text-gray-400 hover:text-gray-600">Back to sign in</a>
            </p>
        </div>
    </div>
</div>

<script>
    // Auto-format: only allow digits
    document.getElementById('pin').addEventListener('input', function(e) {
        this.value = this.value.replace(/\D/g, '').slice(0, 6);
    });
</script>
</body>
</html>
