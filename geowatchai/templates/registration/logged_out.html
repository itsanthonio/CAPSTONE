{% extends 'base.html' %}

{% block title %}Logged Out - {{ settings.APP_NAME }}{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8">
        <div>
            <div class="mx-auto h-12 w-12 flex items-center justify-center">
                <div class="w-8 h-8 bg-active-gold rounded flex items-center justify-center">
                    <span class="text-white font-bold text-sm">G</span>
                </div>
            </div>
            <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
                You have been logged out
            </h2>
            <p class="mt-2 text-center text-sm text-gray-600">
                Thank you for using {{ settings.APP_NAME }}
            </p>
        </div>
        
        <div class="mt-8 space-y-6">
            <div class="text-center">
                <a href="{% url 'login' %}" class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-lg text-white bg-gis-blue hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gis-blue transition-colors">
                    Sign In Again
                </a>
            </div>
            
            <div class="text-center">
                <a href="{% url 'signup' %}" class="text-sm text-gis-blue hover:text-blue-600">
                    Create a new account
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
