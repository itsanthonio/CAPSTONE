{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signed Out — SankofaWatch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'surface-base': 'var(--surface-base)',
                        'surface-2':    'var(--surface-2)',
                        'surface-3':    'var(--surface-3)',
                        'fg-primary':   'var(--text-primary)',
                        'fg-secondary': 'var(--text-secondary)',
                        'fg-muted':     'var(--text-tertiary)',
                        'gw-accent':    'var(--accent)',
                        'edge-default': 'var(--border-default)',
                    },
                    fontFamily: { 'sans': ['Inter', 'ui-sans-serif', 'system-ui'] },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/custom.css' %}">
</head>
<body class="bg-surface-base font-sans antialiased">

<div class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-xs space-y-6 text-center">

        <!-- Sankofa bird mark -->
        <div class="flex justify-center">
            <div class="w-12 h-12 rounded-2xl flex items-center justify-center"
                 style="background: rgba(var(--accent-rgb, 212,160,23), 0.08); border: 1px solid rgba(var(--accent-rgb, 212,160,23), 0.2);">
                <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" aria-hidden="true" focusable="false">
                    <ellipse cx="16" cy="18" rx="7" ry="4.5" fill="var(--accent)" fill-opacity="0.13" stroke="var(--accent)" stroke-width="1.5"/>
                    <path d="M12 16 Q16 11 21 15" stroke="var(--accent)" stroke-width="1.3" stroke-linecap="round" fill="none"/>
                    <path d="M22 17 Q27 12 23.5 6" stroke="var(--accent)" stroke-width="1.6" stroke-linecap="round" fill="none"/>
                    <path d="M11 14 Q7 11 8.5 7" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
                    <circle cx="8.5" cy="5.5" r="2.3" fill="var(--accent)"/>
                    <circle cx="7.6" cy="5" r="0.55" fill="#0d1117" fill-opacity="0.7"/>
                    <path d="M7.5 6.5 L5 8" stroke="var(--accent)" stroke-width="1.3" stroke-linecap="round"/>
                    <ellipse cx="16" cy="14.5" rx="2.1" ry="1.5" fill="var(--accent)" fill-opacity="0.4" stroke="var(--accent)" stroke-width="1"/>
                </svg>
            </div>
        </div>

        <div>
            <h1 class="text-[18px] font-semibold text-fg-primary tracking-tight">You've been signed out</h1>
            <p class="text-[13px] text-fg-secondary mt-2">
                <span style="color: var(--accent); font-style: italic;">Medaase</span> — thank you for helping protect Ghana's environment.
            </p>
        </div>

        <div class="space-y-3">
            <a href="{% url 'login' %}" class="btn-primary w-full py-2 block">
                Sign in again
            </a>
            <a href="{% url 'signup' %}" class="text-[13px] hover:underline" style="color: var(--text-link)">
                Create a new account
            </a>
        </div>

    </div>
</div>

</body>
</html>
