{% load static %}
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <link rel="icon" type="image/svg+xml" href="{% static 'images/favicon.svg' %}">
    <link rel="alternate icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signed Out — {{ settings.APP_NAME }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { 'surface': '#10141a', 'surface-container-lowest': '#0a0e14' }, fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'] } } } }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        .dot-grid { background-image: radial-gradient(circle, rgba(79,70,52,0.35) 1px, transparent 1px); background-size: 32px 32px; }
    </style>
</head>
<body class="bg-surface font-sans antialiased dark min-h-screen flex flex-col">

<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
    <div class="absolute top-1/3 -left-24 w-80 h-80 rounded-full" style="background: rgba(246,190,57,0.04); filter: blur(100px);"></div>
    <div class="absolute inset-0 dot-grid opacity-10"></div>
</div>

<header class="fixed top-0 w-full z-50 flex justify-between items-center h-16 px-8"
        style="background: rgba(16,20,26,0.7); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.04);">
    <span class="text-sm font-black tracking-tighter" style="color: #dfe2eb;">{{ settings.APP_NAME|upper }}</span>
    <a href="{% url 'signup' %}"
       class="text-[10px] uppercase tracking-widest font-medium px-4 py-2 transition-colors"
       style="color: #dfe2eb; border: 1px solid rgba(255,255,255,0.08);"
       onmouseover="this.style.background='rgba(255,255,255,0.05)'"
       onmouseout="this.style.background='transparent'">Sign Up</a>
</header>

<main class="relative z-30 flex-grow flex items-center justify-center p-6 pt-24 pb-12">
    <div class="w-full max-w-xs space-y-6 text-center">

        <!-- Sankofa bird mark -->
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-lg mx-auto"
             style="background: rgba(246,190,57,0.07); border: 1px solid rgba(246,190,57,0.15);">
            <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" aria-hidden="true">
                <ellipse cx="16" cy="18" rx="7" ry="4.5" fill="#f6be39" fill-opacity="0.13" stroke="#f6be39" stroke-width="1.5"/>
                <path d="M12 16 Q16 11 21 15" stroke="#f6be39" stroke-width="1.3" stroke-linecap="round" fill="none"/>
                <path d="M22 17 Q27 12 23.5 6" stroke="#f6be39" stroke-width="1.6" stroke-linecap="round" fill="none"/>
                <path d="M11 14 Q7 11 8.5 7" stroke="#f6be39" stroke-width="1.5" stroke-linecap="round" fill="none"/>
                <circle cx="8.5" cy="5.5" r="2.3" fill="#f6be39"/>
                <circle cx="7.6" cy="5" r="0.55" fill="#0a0e14" fill-opacity="0.7"/>
                <path d="M7.5 6.5 L5 8" stroke="#f6be39" stroke-width="1.3" stroke-linecap="round"/>
                <ellipse cx="16" cy="14.5" rx="2.1" ry="1.5" fill="#f6be39" fill-opacity="0.4" stroke="#f6be39" stroke-width="1"/>
            </svg>
        </div>

        <div>
            <h1 class="text-xl font-bold tracking-tight" style="color: #dfe2eb;">You've been signed out</h1>
            <p class="text-sm mt-2 leading-relaxed" style="color: #d3c5ae;">
                <em style="color: #f6be39; font-style: italic;">Medaase</em> — thank you for helping protect Ghana's environment.
            </p>
        </div>

        <div class="space-y-3">
            <a href="{% url 'login' %}"
               class="w-full py-3.5 text-xs uppercase tracking-[0.2em] font-bold rounded transition-all duration-200 active:scale-[0.98] block"
               style="background: linear-gradient(135deg, #f6be39 0%, #d4a017 100%); color: #402d00; box-shadow: 0 4px 24px rgba(246,190,57,0.12);"
               onmouseover="this.style.boxShadow='0 4px 32px rgba(246,190,57,0.22)'"
               onmouseout="this.style.boxShadow='0 4px 24px rgba(246,190,57,0.12)'">
                Sign In Again
            </a>
            <a href="{% url 'signup' %}" class="text-xs uppercase tracking-widest font-medium transition-colors block"
               style="color: #9b8f7a;"
               onmouseover="this.style.color='#f6be39'" onmouseout="this.style.color='#9b8f7a'">
                Create a new account
            </a>
        </div>

    </div>
</main>

<footer class="relative z-30 w-full py-6 px-10 flex justify-center"
        style="border-top: 1px solid rgba(255,255,255,0.04); background: #0a0e14;">
    <span class="text-[10px] uppercase tracking-widest font-medium" style="color: #6b7280;">
        © 2024 {{ settings.APP_NAME|upper }}. Digital Sentinel Systems.
    </span>
</footer>

</body>
</html>
