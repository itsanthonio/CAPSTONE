{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signed Out — GalamseyWatch AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'surface-base': 'var(--surface-base)',
                        'surface-2':    'var(--surface-2)',
                        'surface-3':    'var(--surface-3)',
                        'fg-primary':   'var(--text-primary)',
                        'fg-secondary': 'var(--text-secondary)',
                        'fg-muted':     'var(--text-tertiary)',
                        'gw-accent':    'var(--accent)',
                        'edge-default': 'var(--border-default)',
                    },
                    fontFamily: { 'sans': ['Inter', 'ui-sans-serif', 'system-ui'] },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/custom.css' %}">
</head>
<body class="bg-surface-base font-sans antialiased">

<div class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-xs space-y-6 text-center">

        <!-- Logo -->
        <div class="flex justify-center">
            <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-9 h-9">
                <path d="M10 10L18 18M30 10L22 18M10 30L18 22M30 30L22 22" stroke="var(--accent)" stroke-width="2.2" stroke-linecap="round"/>
                <circle cx="20" cy="20" r="4" fill="var(--accent)"/>
                <circle cx="20" cy="20" r="9" stroke="var(--accent)" stroke-width="1.6" stroke-dasharray="4 3"/>
                <circle cx="10" cy="10" r="2.5" fill="var(--accent)" fill-opacity="0.45"/>
                <circle cx="30" cy="10" r="2.5" fill="var(--accent)" fill-opacity="0.45"/>
                <circle cx="10" cy="30" r="2.5" fill="var(--accent)" fill-opacity="0.45"/>
                <circle cx="30" cy="30" r="2.5" fill="var(--accent)" fill-opacity="0.45"/>
            </svg>
        </div>

        <div>
            <h1 class="text-[18px] font-semibold text-fg-primary tracking-tight">You've been signed out</h1>
            <p class="text-[13px] text-fg-secondary mt-1">
                Thank you for using GalamseyWatch AI
            </p>
        </div>

        <div class="space-y-3">
            <a href="{% url 'login' %}" class="btn-primary w-full py-2 block">
                Sign in again
            </a>
            <a href="{% url 'signup' %}" class="text-[13px] hover:underline" style="color: var(--text-link)">
                Create a new account
            </a>
        </div>

    </div>
</div>

</body>
</html>
