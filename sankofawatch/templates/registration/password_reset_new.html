{% load static %}
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <link rel="icon" type="image/svg+xml" href="{% static 'images/favicon.svg' %}">
    <link rel="alternate icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password — {{ settings.APP_NAME }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { 'surface': '#10141a', 'surface-container-lowest': '#0a0e14' }, fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'] } } } }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        .dot-grid { background-image: radial-gradient(circle, rgba(79,70,52,0.35) 1px, transparent 1px); background-size: 32px 32px; }
        .glass-panel { background: rgba(16,20,26,0.65); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .input-underline { background: transparent; border: none; border-bottom: 1px solid rgba(79,70,52,0.4); border-radius: 0; outline: none; width: 100%; padding: 10px 2rem 10px 2rem; color: #dfe2eb; font-size: 14px; transition: border-color 0.2s; }
        .input-underline::placeholder { color: rgba(155,143,122,0.45); }
        .input-underline:focus { border-bottom-color: #f6be39; }
        .strength-seg { height: 3px; flex: 1; border-radius: 2px; background: rgba(79,70,52,0.3); transition: background 0.2s; }
        .pwd-toggle { position: absolute; right: 0; top: 50%; transform: translateY(-50%); background: none; border: none; padding: 2px; cursor: pointer; color: rgba(155,143,122,0.6); transition: color 0.15s; display: flex; align-items: center; }
        .pwd-toggle:hover { color: #d3c5ae; }
    </style>
</head>
<body class="bg-surface font-sans antialiased dark min-h-screen flex flex-col">

<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
    <div class="absolute top-1/3 -left-24 w-80 h-80 rounded-full" style="background: rgba(246,190,57,0.05); filter: blur(100px);"></div>
    <div class="absolute inset-0 dot-grid opacity-10"></div>
</div>

<header class="fixed top-0 w-full z-50 flex justify-between items-center h-16 px-8"
        style="background: rgba(16,20,26,0.7); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.04);">
    <span class="text-sm font-black tracking-tighter" style="color: #dfe2eb;">{{ settings.APP_NAME|upper }}</span>
    <a href="{% url 'login' %}"
       class="text-[10px] uppercase tracking-widest font-medium px-4 py-2 transition-colors"
       style="color: #dfe2eb; border: 1px solid rgba(255,255,255,0.08);"
       onmouseover="this.style.background='rgba(255,255,255,0.05)'"
       onmouseout="this.style.background='transparent'">Sign In</a>
</header>

<main class="relative z-30 flex-grow flex items-center justify-center p-6 pt-24 pb-12">
    <div class="w-full max-w-sm space-y-6">

        <div class="text-center">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-lg mb-4"
                 style="background: rgba(246,190,57,0.08); border: 1px solid rgba(246,190,57,0.15);">
                <svg class="w-6 h-6" fill="none" stroke="#f6be39" stroke-width="1.8" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold tracking-tight" style="color: #dfe2eb;">Set a new password</h1>
            <p class="text-sm mt-2" style="color: #d3c5ae;">Choose a strong password for your account</p>
        </div>

        <div class="glass-panel p-8 rounded-lg shadow-2xl" style="border: 1px solid rgba(79,70,52,0.15);">

            {% if error %}
            <div class="mb-6 px-4 py-3 rounded text-sm flex gap-2.5"
                 style="background: rgba(147,0,10,0.15); border: 1px solid rgba(255,180,171,0.2); color: #ffb4ab;"
                 role="alert" aria-live="assertive">
                <svg class="w-4 h-4 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
                <p>{{ error }}</p>
            </div>
            {% endif %}

            <form method="post" class="space-y-5">
                {% csrf_token %}

                <div class="space-y-1.5">
                    <label for="new_password1" class="block text-[10px] uppercase tracking-widest font-bold" style="color: #9b8f7a;">New Password</label>
                    <div class="relative">
                        <svg class="absolute left-0 top-1/2 -translate-y-1/2 w-4 h-4 pointer-events-none" fill="none" stroke="rgba(155,143,122,0.6)" stroke-width="1.8" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                        </svg>
                        <input id="new_password1" name="new_password1" type="password" required autocomplete="new-password"
                               class="input-underline" placeholder="At least 8 characters">
                        <button type="button" class="pwd-toggle" onclick="togglePwd('new_password1')" aria-label="Toggle visibility">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                    <div id="strength-bar" class="hidden mt-2">
                        <div class="flex gap-1 mb-1">
                            <div id="s1" class="strength-seg"></div>
                            <div id="s2" class="strength-seg"></div>
                            <div id="s3" class="strength-seg"></div>
                            <div id="s4" class="strength-seg"></div>
                        </div>
                        <p id="strength-label" class="text-[11px]" style="color: #9b8f7a;"></p>
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label for="new_password2" class="block text-[10px] uppercase tracking-widest font-bold" style="color: #9b8f7a;">Confirm Password</label>
                    <div class="relative">
                        <svg class="absolute left-0 top-1/2 -translate-y-1/2 w-4 h-4 pointer-events-none" fill="none" stroke="rgba(155,143,122,0.6)" stroke-width="1.8" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                        </svg>
                        <input id="new_password2" name="new_password2" type="password" required autocomplete="new-password"
                               class="input-underline" placeholder="Repeat your new password">
                        <button type="button" class="pwd-toggle" onclick="togglePwd('new_password2')" aria-label="Toggle visibility">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit"
                        class="w-full py-3.5 text-xs uppercase tracking-[0.2em] font-bold rounded transition-all duration-200 active:scale-[0.98] mt-2"
                        style="background: linear-gradient(135deg, #f6be39 0%, #d4a017 100%); color: #402d00; box-shadow: 0 4px 24px rgba(246,190,57,0.12);"
                        onmouseover="this.style.boxShadow='0 4px 32px rgba(246,190,57,0.22)'"
                        onmouseout="this.style.boxShadow='0 4px 24px rgba(246,190,57,0.12)'">
                    Save New Password
                </button>
            </form>
        </div>

    </div>
</main>

<footer class="relative z-30 w-full py-6 px-10 flex justify-center"
        style="border-top: 1px solid rgba(255,255,255,0.04); background: #0a0e14;">
    <span class="text-[10px] uppercase tracking-widest font-medium" style="color: #6b7280;">
        © 2024 {{ settings.APP_NAME|upper }}. Digital Sentinel Systems.
    </span>
</footer>

<script>
function togglePwd(id) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
}

(function () {
    const p1 = document.getElementById('new_password1');
    const bar = document.getElementById('strength-bar');
    const label = document.getElementById('strength-label');
    const segs = ['s1','s2','s3','s4'].map(id => document.getElementById(id));
    const segColors = ['#ffb4ab','#f97316','#f6be39','#67df70'];
    const segLabels = ['Too weak','Weak','Fair','Strong'];

    p1.addEventListener('input', () => {
        const v = p1.value;
        if (!v) { bar.classList.add('hidden'); return; }
        bar.classList.remove('hidden');
        let score = 0;
        if (v.length >= 8) score++;
        if (/[A-Z]/.test(v)) score++;
        if (/[0-9]/.test(v)) score++;
        if (/[^A-Za-z0-9]/.test(v)) score++;
        segs.forEach((s, i) => {
            s.style.background = i < score ? segColors[score - 1] : 'rgba(79,70,52,0.3)';
        });
        label.textContent = segLabels[score - 1] || '';
        label.style.color = score > 0 ? segColors[score - 1] : '#9b8f7a';
    });
})();
</script>

</body>
</html>
